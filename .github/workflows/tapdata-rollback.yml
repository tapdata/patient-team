name: TapData Rollback

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - sit
          - lpt
          - aat
          - prod
      last_stable_tag:
        description: 'Tag to rollback to (required)'
        required: true
        type: string

jobs:
  rollback:
    uses: tapdata/ha-cicd-worker/.github/workflows/tapdata-rollback.yml@main
    with:
      project: ${{ github.event.repository.name }}
      target_env: ${{ inputs.target_env }}
      last_stable_tag: ${{ inputs.last_stable_tag }}
      caller_repo: ${{ github.repository }}
    secrets: inherit
